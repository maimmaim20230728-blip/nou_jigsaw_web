<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#66BB6A"/>
      <stop offset="1" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C5E1A5"/>
      <stop offset="1" stop-color="#66BB6A"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- 顔＝ジグソーピース（上と右にぽっち） -->
  <g fill="#F7F3E8">
    <rect x="136" y="210" width="240" height="222" rx="44"/>
    <circle cx="256" cy="212" r="36"/>
    <circle cx="374" cy="300" r="30"/>
  </g>

  <!-- ほっぺ（ピンク） -->
  <ellipse cx="180" cy="352" rx="22" ry="13" fill="#F48FB1" opacity="0.6"/>
  <ellipse cx="332" cy="352" rx="22" ry="13" fill="#F48FB1" opacity="0.6"/>

  <!-- つぶらな目 -->
  <ellipse cx="212" cy="318" rx="16" ry="20" fill="#3B3230"/>
  <ellipse cx="300" cy="318" rx="16" ry="20" fill="#3B3230"/>
  <circle cx="206" cy="310" r="5.5" fill="#FFFFFF"/>
  <circle cx="294" cy="310" r="5.5" fill="#FFFFFF"/>

  <!-- にっこり口 -->
  <path d="M230 348 q26 26 52 0" fill="none" stroke="#6D4C41" stroke-width="9" stroke-linecap="round"/>

  <!-- 若葉（そよぎ）が上のぽっちから芽吹く -->
  <path d="M256 178 C 250 152 250 132 256 110" fill="none" stroke="#4CAF50" stroke-width="13" stroke-linecap="round"/>
  <path d="M258 138 C 284 118 314 122 326 144 C 300 166 268 162 258 138 Z" fill="url(#leaf)"/>
  <path d="M254 120 C 228 100 198 104 186 126 C 212 148 244 144 254 120 Z" fill="url(#leaf)"/>

  <!-- オレンジの小ピース（あそび心） -->
  <g transform="translate(86 134) rotate(-14)" fill="#FFB74D">
    <rect x="0" y="0" width="58" height="54" rx="12"/>
    <circle cx="29" cy="-6" r="10"/>
    <circle cx="64" cy="27" r="9"/>
  </g>

  <!-- きらめき -->
  <path d="M388 150 l8 20 l20 8 l-20 8 l-8 20 l-8 -20 l-20 -8 l20 -8 Z" fill="#FFD54F"/>
  <circle cx="404" cy="238" r="8" fill="#FFECB3"/>
</svg>
