<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2E7D32">
<meta name="description" content="高齢者向けの、オフラインで動く無料・広告なしのジグソーパズル。自分の写真や名画36点で。15言語対応。">
<!-- 共有プレビュー（OGP / Twitter） -->
<meta property="og:title" content="脳活ジグソーパズル">
<meta property="og:description" content="じぶんの写真が、パズルになる。無料・広告なし・オフラインのジグソーパズル（15言語）">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nou-jigsaw-web.vercel.app/">
<meta property="og:image" content="https://nou-jigsaw-web.vercel.app/icons/farcaster-embed.png">
<meta name="twitter:card" content="summary_large_image">
<!-- Farcaster Mini App 埋め込み（タイムラインで画像＋ボタン→タップで起動） -->
<meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://nou-jigsaw-web.vercel.app/icons/farcaster-embed.png","button":{"title":"🧩 あそぶ / Play","action":{"type":"launch_miniapp","name":"脳活ジグソーパズル","url":"https://nou-jigsaw-web.vercel.app/","splashImageUrl":"https://nou-jigsaw-web.vercel.app/icons/icon-512.png","splashBackgroundColor":"#2E7D32"}}}' />
<!-- 旧クライアント/バリデータ互換の fc:frame 併記（中身同一） -->
<meta name="fc:frame" content='{"version":"1","imageUrl":"https://nou-jigsaw-web.vercel.app/icons/farcaster-embed.png","button":{"title":"🧩 あそぶ / Play","action":{"type":"launch_frame","name":"脳活ジグソーパズル","url":"https://nou-jigsaw-web.vercel.app/","splashImageUrl":"https://nou-jigsaw-web.vercel.app/icons/icon-512.png","splashBackgroundColor":"#2E7D32"}}}' />
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>脳活ジグソーパズル</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="scale-M">

  <!-- ========== ホーム ========== -->
  <section id="home" class="screen active">
    <button id="btnGear" class="gear" aria-label="settings">⚙</button>
    <div class="logo">脳活ジグソー</div>
    <div class="tagline" data-i18n="tagline">じぶんの しゃしんで ジグソーパズル</div>
    <button id="btnStart" class="big-btn start" data-i18n="start">はじめる</button>
    <div id="homeInfo" class="home-info"></div>
    <button id="btnRecords" class="records-btn" data-i18n="records">記録を見る</button>
    <a class="credit" id="creditLink"
       href="https://soyogi.hp.peraichi.com/top" target="_blank" rel="noopener noreferrer"
       data-i18n="credit">アプリ開発：介護と支援の相談どころ　そよぎ</a>
  </section>

  <!-- ========== 難易度選択 ========== -->
  <section id="level" class="screen">
    <h2 data-i18n="chooseLevel">むずかしさを えらんでね</h2>
    <button class="big-btn lv-btn lv-easy" data-level="easy">
      <span class="lv-name" data-i18n="levelEasy">初級</span>
      <span class="lv-sub"><span class="lv-grid g2">▦</span> 4 <span data-i18n="pieceUnit">ピース</span></span>
    </button>
    <button class="big-btn lv-btn lv-mid" data-level="mid">
      <span class="lv-name" data-i18n="levelMid">中級</span>
      <span class="lv-sub"><span class="lv-grid g3">▦</span> 9 <span data-i18n="pieceUnit">ピース</span></span>
    </button>
    <button class="big-btn lv-btn lv-hard" data-level="hard">
      <span class="lv-name" data-i18n="levelHard">上級</span>
      <span class="lv-sub"><span class="lv-grid g4">▦</span> 16 <span data-i18n="pieceUnit">ピース</span></span>
    </button>
    <button class="link-back" data-home data-i18n="back">ホームにもどる</button>
  </section>

  <!-- ========== 写真の入手先選択 ========== -->
  <section id="source" class="screen">
    <h2 data-i18n="chooseSource">しゃしんを えらんでね</h2>
    <button id="btnAlbum" class="big-btn src-btn">📷 <span data-i18n="fromAlbum">アルバムから えらぶ</span></button>
    <button id="btnCamera" class="big-btn src-btn">📸 <span data-i18n="fromCamera">カメラで とる</span></button>
    <button id="btnSample" class="big-btn src-btn src-sample">🖼 <span data-i18n="useSample">サンプルを つかう</span></button>
    <div id="srcLoading" class="src-loading"></div>
    <button class="link-back" data-home data-i18n="back">ホームにもどる</button>
    <input type="file" id="fileAlbum" accept="image/*" hidden>
    <input type="file" id="fileCamera" accept="image/*" capture="environment" hidden>
  </section>

  <!-- ========== サンプル（名画）選択 ========== -->
  <section id="samples" class="screen">
    <h2 data-i18n="useSample">サンプルを つかう</h2>
    <div id="sampleGrid" class="sample-grid"></div>
    <button class="link-back" data-home data-i18n="back">ホームにもどる</button>
  </section>

  <!-- ========== パズル ========== -->
  <section id="game" class="screen">
    <div class="g-instruct" data-i18n="instructPuzzle">ピースを ドラッグして いれかえてね</div>
    <div class="g-body"></div>
    <button id="btnHint" class="hint-btn">💡 <span data-i18n="hint">ヒント</span></button>
    <button id="btnQuit" class="link-back" data-i18n="back">ホームにもどる</button>
  </section>

  <!-- ========== 結果 ========== -->
  <section id="result" class="screen">
    <div class="result-title" data-i18n="wellDone">かんせい！</div>
    <div id="resultBody"></div>
    <button id="btnAgain" class="big-btn" data-i18n="again">もういちど</button>
    <button id="btnOther" class="big-btn other-btn" data-i18n="otherPhoto">べつの しゃしんで</button>
    <button class="link-back" data-home data-i18n="back">ホームにもどる</button>
  </section>

  <!-- ========== 設定 ========== -->
  <section id="settings" class="screen settings">
    <h2 data-i18n="settings">せってい</h2>
    <div class="set-label" data-i18n="language">ことば</div>
    <div id="langGrid" class="lang-grid"></div>
    <div class="set-label" data-i18n="textSize">もじの大きさ</div>
    <div id="sizeRow" class="size-row">
      <button class="size-btn" data-s="M">A</button>
      <button class="size-btn" data-s="L">A</button>
      <button class="size-btn" data-s="XL">A</button>
    </div>
    <div class="set-label" data-i18n="sound">おと</div>
    <button id="soundBtn" class="sound-btn">🔊</button>
    <div class="set-label" data-i18n="music">おんがく</div>
    <button id="bgmBtn" class="sound-btn">🎵</button>
    <button class="link-back" data-home data-i18n="back">ホームにもどる</button>
  </section>

  <!-- ========== 記録（カレンダー） ========== -->
  <section id="records" class="screen records">
    <div class="cal-head">
      <button id="calPrev" class="cal-nav" aria-label="prev">◀</button>
      <div id="calMonth" class="cal-month"></div>
      <button id="calNext" class="cal-nav" aria-label="next">▶</button>
    </div>
    <div id="calWeek" class="cal-week"></div>
    <div id="calGrid" class="cal-grid"></div>
    <div class="cal-legend">
      <span class="lg e"></span><span class="lg-t" data-i18n="levelEasy">初級</span>
      <span class="lg m"></span><span class="lg-t" data-i18n="levelMid">中級</span>
      <span class="lg h"></span><span class="lg-t" data-i18n="levelHard">上級</span>
    </div>
    <div id="dayDetail" class="day-detail"></div>
    <button class="link-back" data-home data-i18n="back">ホームにもどる</button>
  </section>

  <!-- ========== 見本の拡大表示（パズル中に見本をタップ） ========== -->
  <div id="refZoom" class="ref-zoom" hidden>
    <button id="refZoomClose" class="ref-zoom-close" aria-label="close">✕</button>
    <img id="refZoomImg" class="ref-zoom-img" src="" alt="">
  </div>

  <!-- スクリプト（順番が大事） -->
  <script src="data/config.js"></script>
  <script src="data/lang.js"></script>
  <script src="audio.js"></script>
  <script src="store.js"></script>
  <script src="tap.js"></script>
  <script src="puzzle.js"></script>
  <script src="app.js"></script>

  <!-- Farcaster Mini App SDK：読込完了を通知しスプラッシュを閉じる（Farcaster外・オフラインでは無害にスキップ） -->
  <script type="module">
    try {
      const { sdk } = await import("https://esm.sh/@farcaster/miniapp-sdk");
      await sdk.actions.ready();
    } catch (e) { /* Farcaster外では何もしない */ }
  </script>
</body>
</html>
